# =============================================================================
# RASA-ID Docker Compose - PRODUCTION
# =============================================================================
# JANGAN digunakan untuk development! Gunakan docker-compose.yml untuk itu.
#
# Setup:
#   1. cp .env.example .env
#   2. Edit .env — isi password dan ADMIN_KEY yang kuat
#   3. Taruh model YOLO Anda di: backend/storage/models/best.pt
#   4. docker compose -f docker-compose.prod.yml up --build -d
#
# Catatan:
#   - Frontend dibangun menjadi file statis dan di-serve oleh Nginx (port 80)
#   - Backend dijalankan dengan multiple workers (bukan hot-reload)
#   - Secret hanya dibaca dari file .env (tidak ada yang hardcoded)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Database Service (PostgreSQL 15)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: rasa_id_db
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    # Production: TIDAK expose port ke luar host (hanya internal Docker network)
    # Hapus komentar di bawah jika perlu akses dari Navicat di production server
    # ports:
    #   - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - rasa_internal

  # ---------------------------------------------------------------------------
  # Backend Service (FastAPI + Uvicorn Production)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rasa_id_backend
    restart: always

    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_PATH: ${STORAGE_PATH:-./storage}
      MODEL_PATH: ${MODEL_PATH:-./storage/models/best.pt}
      CONF_THRESHOLD: ${CONF_THRESHOLD:-0.5}
      ADMIN_KEY: ${ADMIN_KEY}
      APP_ENV: production

    ports:
      - "8000:8000"

    volumes:
      # Hanya storage yang di-mount (bukan kode sumber!)
      - ./backend/storage:/app/storage

    depends_on:
      db:
        condition: service_healthy

    networks:
      - rasa_internal
      - rasa_public

  # ---------------------------------------------------------------------------
  # Frontend Service (React + Nginx — Production Build)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # URL backend publik (diakses oleh browser user, bukan Docker internal)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: rasa_id_frontend
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - rasa_public

  # ---------------------------------------------------------------------------
  # Admin Dashboard Service (Streamlit) - Optional
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./admin_dashboard
      dockerfile: Dockerfile
    container_name: rasa_id_admin
    restart: always

    env_file:
      - .env
    environment:
      # Internal Docker URL (admin -> backend via Docker network)
      ADMIN_API_BASE_URL: http://backend:8000

    ports:
      - "8501:8501"

    depends_on:
      - backend

    networks:
      - rasa_internal

# Named volumes
volumes:
  postgres_data:
    name: rasa_id_postgres_data

# Networks
networks:
  # Internal network: hanya backend, db, admin yang bisa saling berkomunikasi
  rasa_internal:
    driver: bridge

  # Public network: frontend bisa berkomunikasi dengan backend
  rasa_public:
    driver: bridge
