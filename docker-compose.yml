services:
  db:
    image: postgres:15-alpine
    container_name: rasa_id_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: rasa_id_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rasa_id_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rasa_id_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres_password@db:5432/rasa_id_db
      CORS_ORIGINS: http://104.248.159.85:5173,http://104.248.159.85
      STORAGE_PATH: /app/storage
      MODEL_PATH: /app/storage/models/best.pt
      CONF_THRESHOLD: "0.5"
      ADMIN_KEY: admin_secret_123
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
      - ./ml:/app/ml
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rasa_id_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://104.248.159.85:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: rasa_id_postgres_data