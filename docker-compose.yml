# =============================================================================
# RASA-ID Docker Compose Configuration
# =============================================================================
# Step 1: PostgreSQL Database Service
# Run with: docker compose up -d db
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Database Service (PostgreSQL 15)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: rasa_id_db
    restart: unless-stopped
    
    # Environment variables for PostgreSQL initialization
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: rasa_id_db
    
    # Port mapping: host:container
    ports:
      - "5432:5432"
    
    # Persistent volume for database data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # Healthcheck to verify database is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rasa_id_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend Service (FastAPI + Uvicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rasa_id_backend
    restart: unless-stopped
    
    # Environment variables
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres_password@db:5432/rasa_id_db
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173
      STORAGE_PATH: ./storage
      MODEL_PATH: ./storage/models/best.pt
      CONF_THRESHOLD: "0.5"
      ADMIN_KEY: admin_secret_123
    
    # Port mapping
    ports:
      - "8000:8000"
    
    # Mount storage directory for persistence + app code for hot reload + ML folder
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./ml:/app/ml
    
    # Wait for database to be healthy before starting
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend Service (Vite React)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rasa_id_frontend
    restart: unless-stopped
    
    # Environment variables (build-time for Vite)
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    
    # Port mapping
    ports:
      - "5173:5173"
    
    # Volume mount for development hot-reload
    # Kode lokal akan sync ke container sehingga perubahan langsung terlihat
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
    
    # Wait for backend to start
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Admin Dashboard Service (Streamlit) - Optional
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./admin_dashboard
      dockerfile: Dockerfile
    container_name: rasa_id_admin
    restart: unless-stopped
    
    # Environment variables
    environment:
      ADMIN_API_BASE_URL: http://backend:8000
      ADMIN_KEY: admin_secret_123
      DASHBOARD_PASSWORD: admin123
    
    # Port mapping
    ports:
      - "8501:8501"
    
    # Volume mount for development hot-reload
    volumes:
      - ./admin_dashboard:/app
    
    # Wait for backend to start
    depends_on:
      - backend

# Named volumes for data persistence
volumes:
  postgres_data:
    name: rasa_id_postgres_data